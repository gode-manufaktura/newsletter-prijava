<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanjaka Grupa | Newsletter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Duboki, mekani Apple gradijent */
            background: radial-gradient(circle at top left, #4a4a4c, #121212);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Lagan, tanak font */
            font-family: "SF Pro Display", "-apple-system", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Pozadinski "tekući" krugovi za bolji glass efekt */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(0, 113, 227, 0.2), rgba(255, 255, 255, 0.05));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        /* GLAVNA STAKLENA PLOČA */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            padding: 60px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h3 {
            font-weight: 200; /* Ultra tanak font */
            font-size: 32px;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 40px;
        }

        /* INPUT POLJE - GLASS STYLE */
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            font-weight: 300;
            outline: none;
            transition: 0.3s ease;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* DUGME - CLEAN GLASS */
        input[type="submit"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            color: black;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* DONJI LIJEVI KUT - STAKLO */
        .legal-box {
            position: fixed;
            left: 30px;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 400px;
        }

        .pravni-tekst, .poduzeca-lista {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .poduzeca-lista {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* DONJI DESNI KUT - LOGO U STAKLU */
        .footer-container {
            position: fixed;
            right: 30px;
            bottom: 30px;
            text-align: right;
        }

        .logo-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: inline-block;
        }

        .logo-glass img {
            width: 350px;
            filter: brightness(1.1); /* Blago posvjetljivanje logotipa */
        }

        .copyright-text {
            display: block;
            margin-top: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* KLASA BROJ - SUPTILNO */
        .klasa-broj {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: 100px; background: rgba(255,255,255,0.02);"></div>

    <div class="klasa-broj">
        KLASA: 011-02/26-01/48 &nbsp; | &nbsp; URBROJ: 2181-125-01-26-2
    </div>

    <div class="glass-card">
        <h3>Vanjaka Newsletter</h3>
        <form action="https://script.google.com/macros/s/AKfycbxqSXBkA1h4BK2naHJs8JCRv3pyJl79Ta9uwMsezVXNnOJaxqEnYU_p0rLJfAE5rANQ/exec" method="POST">
            <input type="text" name="tekstUnos" placeholder="Email adresa" required>
            <input type="submit" value="Prijava">
        </form>
    </div>

    <div class="legal-box">
        <p class="pravni-tekst">
            Ovim upisom pristajete na distribuciju informacija unutar sustava Vanjaka Grupe.
        </p>
        <div class="poduzeca-lista">
            Vanjaka d.o.o. / Foto Lab / Gode Manufaktura / JOMA (u stečaju)
        </div>
    </div>

    <div class="footer-container">
        <div class="logo-glass">
            <img src="logo.png" alt="Logo">
        </div>
        <span class="copyright-text">© 2026 VANJAKA GRUPA D.D.</span>
    </div>

</body>
</html>
