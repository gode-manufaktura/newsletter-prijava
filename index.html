<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanjaka Grupa | Responsive Cascade</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(45px) saturate(180%);
            --standard-radius: 40px; 
            --pill-radius: 100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 20% 20%, #3a3a3c, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "SF Pro Display", "-apple-system", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; /* Sprječava scrollanje lijevo-desno */
            padding: 40px;
        }

        /* --- CONTAINER KOJI DRŽI KASKADU --- */
        .cascade-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px; /* Maksimalna širina za ultra-wide monitore */
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--standard-radius);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- 1. PLOHA: NASLOV (Gornja Lijeva) --- */
        .panel-title {
            width: 35%;
            height: 30%;
            top: 5%;
            left: 5%;
            z-index: 1;
        }

        .panel-title h3 {
            font-weight: 200;
            font-size: clamp(20px, 3vw, 36px); /* Skalira se s veličinom ekrana */
            color: white;
            letter-spacing: -1px;
            text-align: center;
        }

        /* --- 2. PLOHA: CENTRALNA (S GUMBIMA - MORA BITI NA VRHU) --- */
        .panel-form {
            width: 45%;
            height: 45%;
            z-index: 10; /* Najviši z-index da gumbi uvijek budu dostupni */
            padding: 40px;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--pill-radius);
            padding: 20px;
            color: white;
            font-size: 16px;
            font-weight: 300;
            outline: none;
            text-align: center;
        }

        input[type="submit"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: var(--pill-radius);
            padding: 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        /* --- 3. PLOHA: LOGO (Donja Desna) --- */
        .panel-logo {
            width: 40%;
            height: 40%;
            bottom: 5%;
            right: 5%;
            z-index: 2;
            padding: 30px;
        }

        .panel-logo img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0.9;
        }

        /* --- RESPONSIVE POPRAVCI (Mobiteli i manji ekrani) --- */
        @media (max-width: 900px) {
            .cascade-wrapper {
                height: auto;
                flex-direction: column;
                gap: 20px;
            }
            .glass {
                position: relative; /* Gube apsolutni položaj da se ne bi skroz preklopili na mobitelu */
                width: 100% !important;
                height: auto !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                margin-bottom: -20px; /* Simulacija preklapanja */
                padding: 30px;
            }
            .panel-form { z-index: 10; } /* Gumbi i dalje na vrhu */
        }

        /* Službeni detalji */
        .legal-box {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .klasa-broj {
            position: fixed;
            top: 20px; right: 20px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.1);
            font-family: monospace;
        }

        .copyright-text {
            position: fixed;
            bottom: 20px; right: 20px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="klasa-broj">KLASA: 011-02/26-01/48 | URBROJ: 2181-125-01-26-2</div>

    <div class="cascade-wrapper">
        
        <div class="panel-title glass">
            <h3>Vanjaka Newsletter</h3>
        </div>

        <div class="panel-form glass">
            <form action="https://script.google.com/macros/s/AKfycbxqSXBkA1h4BK2naHJs8JCRv3pyJl79Ta9uwMsezVXNnOJaxqEnYU_p0rLJfAE5rANQ/exec" method="POST">
                <input type="text" name="tekstUnos" placeholder="Email adresa" required>
                <input type="submit" value="PRIJAVA">
            </form>
            <div class="legal-box">
                Vanjaka d.o.o. • Foto Lab • Gode Manufaktura • JOMA (stečaj)
            </div>
        </div>

        <div class="panel-logo glass">
            <img src="logo.png" alt="Logo">
        </div>

    </div>

    <span class="copyright-text">© 2026 VANJAKA GRUPA D.D.</span>

</body>
</html>
