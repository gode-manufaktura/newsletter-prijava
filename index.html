<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanjaka Grupa | Newsletter Premium</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(50px) saturate(190%);
            --standard-radius: 40px; 
            --pill-radius: 100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 15% 15%, #444, #000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "SF Pro Display", "-apple-system", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            padding: 20px;
        }

        .cascade-wrapper {
            position: relative;
            width: 100%;
            max-width: 1400px; 
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--standard-radius);
            box-shadow: 0 50px 120px rgba(0,0,0,0.7);
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- 1. NASLOV (Manja, ali široka ploha) --- */
        .panel-title {
            width: 38%;
            height: 25%;
            top: 5%;
            left: 5%;
            z-index: 1;
        }

        .panel-title h3 {
            font-weight: 200;
            font-size: clamp(24px, 4vw, 42px);
            color: white;
            letter-spacing: -1.5px;
            text-align: center;
        }

        /* --- 2. CENTRALNA FORMA (Fiksni z-index za gumb) --- */
        .panel-form {
            width: 45%;
            height: 40%;
            z-index: 10;
            padding: 50px;
            top: 25%;
            left: 25%;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--pill-radius);
            padding: 22px;
            color: white;
            font-size: 18px;
            font-weight: 300;
            outline: none;
            text-align: center;
        }

        input[type="submit"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: var(--pill-radius);
            padding: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s;
        }

        input[type="submit"]:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        /* --- 3. POVEĆANI LOGO (Masivna ploha) --- */
        .panel-logo {
            width: 50%;  /* Povećano sa 40% na 50% */
            height: 50%; /* Povećano sa 40% na 50% */
            bottom: 5%;
            right: 5%;
            z-index: 2;
            padding: 40px;
        }

        .panel-logo img {
            width: 100%;    /* Slika sada ispunjava širinu ploče */
            height: 100%;   /* Slika ispunjava visinu */
            object-fit: contain; /* Zadržava proporcije logotipa */
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        /* --- RESPONSIVE ZA MOBITELE --- */
        @media (max-width: 1024px) {
            .cascade-wrapper { height: auto; flex-direction: column; }
            .glass {
                position: relative;
                width: 100% !important;
                height: auto !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                margin-bottom: -30px;
                padding: 40px;
            }
            .panel-logo img { width: 80%; }
        }

        .legal-box {
            margin-top: 25px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .klasa-broj {
            position: fixed;
            top: 25px; right: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            font-family: monospace;
        }

        .copyright-text {
            position: fixed;
            bottom: 25px; right: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="klasa-broj">KLASA: 011-02/26-01/48 | URBROJ: 2181-125-01-26-2</div>

    <div class="cascade-wrapper">
        
        <div class="panel-title glass">
            <h3>Vanjaka Newsletter</h3>
        </div>

        <div class="panel-form glass">
            <form action="https://script.google.com/macros/s/AKfycbxqSXBkA1h4BK2naHJs8JCRv3pyJl79Ta9uwMsezVXNnOJaxqEnYU_p0rLJfAE5rANQ/exec" method="POST">
                <input type="text" name="tekstUnos" placeholder="Email adresa" required>
                <input type="submit" value="PRIJAVA">
            </form>
            <div class="legal-box">
                Vanjaka d.o.o. • Foto Lab • Gode Manufaktura • JOMA (stečaj)
            </div>
        </div>

        <div class="panel-logo glass">
            <img src="logo.png" alt="Logo">
        </div>

    </div>

    <span class="copyright-text">© 2026 VANJAKA GRUPA D.D.</span>

</body>
</html>
